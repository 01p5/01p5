name: CI

# W1-2 plan item: ruff + pytest on every push/PR.
# Scope is intentionally minimal — lint and unit-test the agentlib core
# (no LLM calls, no kubectl). Integration tests against real providers
# come in W3-4 once we have the orchestrator wired to AWS.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: libs/agentlib
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal test dependencies
        # We deliberately do NOT install the full pinned dependency set
        # (langchain 1.x, litellm, anthropic, etc.) — the unit tests cover
        # the pure-python core (spec, runtime, bus, orchestrator, budget)
        # and only need langchain.tools + pydantic.
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pydantic 'langchain>=0.3,<2.0' 'langchain-core>=0.3,<2.0' fakeredis

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test agentlib core (pytest)
        run: pytest -v

      - name: Test sysadmin agent (pytest)
        working-directory: agents/sysadmin
        run: pytest -v

      - name: Test programmer agent (pytest)
        working-directory: agents/programmer
        run: pytest -v

      - name: Test terraform agent (pytest)
        working-directory: agents/terraform
        run: pytest -v

      - name: Test ansible agent (pytest)
        working-directory: agents/ansible
        run: pytest -v

      - name: Test orchestrator CLI wiring (pytest)
        working-directory: agents/olympus_cli
        run: pytest -v

      - name: Test dashboard backend (pytest)
        working-directory: agents/dashboard
        run: pytest -v
