- name: will wait till reachable
  hosts: master
  gather_facts: no
  tasks:
    - name: Wait for system to become reachable
      wait_for_connection:

    - name: Gather facts for the first time
      setup:
- hosts: master
  become: true
  tasks:
    - name: Wait until apt/dpkg lock is free
      shell: |
        fuser /var/lib/dpkg/lock >/dev/null 2>&1 && exit 1
        fuser /var/lib/apt/lists/lock >/dev/null 2>&1 && exit 1
        fuser /var/cache/apt/archives/lock >/dev/null 2>&1 && exit 1
        exit 0
      register: apt_lock_check
      retries: 60
      delay: 10
      until: apt_lock_check.rc == 0

    - name: Update system
      apt:
        update_cache: yes
        upgrade: dist
      retries: 10
      delay: 10

    - name: Disable swap
      command: swapoff -a

    - name: Remove swap entry from fstab
      replace:
        path: /etc/fstab
        regexp: '(\s+swap\s+)'
        replace: '# \1'

    - name: Load required kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Configure sysctl
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
    - name: Apply sysctl
      command: sysctl --system

    - name: Install containerd
      apt:
        name: containerd
        state: present

    - name: Configure containerd
      shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
        systemctl restart containerd
        systemctl enable containerd

    - name: Ensure Kubernetes apt key is installed
      ansible.builtin.apt_key:
        url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
        state: present

    - name: Ensure Kubernetes apt repository is present
      ansible.builtin.apt_repository:
        repo: "deb https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
        state: present
        filename: kubernetes

    - name: Install kubelet, kubeadm, kubectl
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl # (omit this line on workers if you want)
          - python3-pip
        state: present
        update_cache: yes

    - name: Hold kubelet, kubeadm, kubectl at current version
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Initialize control plane
      command: kubeadm init --pod-network-cidr=10.244.0.0/16
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create kube config directory
      file:
        path: /root/.kube
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy admin.conf to kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        owner: root
        group: root
        mode: "0644"

    - name: Install calico CNI
      command: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.30.2/manifests/calico.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Install local path provisioner
      command: kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/master/deploy/local-path-storage.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Get join command
      shell: kubeadm token create --print-join-command
      register: join_cmd

    - name: Save join command for workers
      copy:
        dest: /tmp/kube_join.sh
        content: |
          #!/bin/bash
          {{ join_cmd.stdout }}
        mode: "0755"

    - name: Install Docker
      ansible.builtin.import_tasks: docker.yml

