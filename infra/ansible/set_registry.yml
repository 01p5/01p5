---
- hosts: all:!router
  become: yes
  vars:
    registry_host: "{{ hostvars['master'].ansible_host }}"
    registry_port: 30500

  tasks:
    - name: Ensure containerd directory exists
      file:
        path: /etc/containerd
        state: directory

    - name: Generate default containerd config.toml if not present
      command: containerd config default
      register: containerd_config
      changed_when: false
      failed_when: false

    - name: Write default containerd config.toml if missing
      copy:
        content: "{{ containerd_config.stdout }}"
        dest: /etc/containerd/config.toml
      when: containerd_config.stdout is defined and containerd_config.stdout != ""

    - name: Configure containerd to trust local registry
      blockinfile:
        path: /etc/containerd/config.toml
        marker: "# {mark} ANSIBLE REGISTRY CONFIG"
        insertafter: '\[plugins."io.containerd.grpc.v1.cri"\]'
        block: |
          [plugins."io.containerd.grpc.v1.cri".registry.mirrors."{{ registry_host }}:{{ registry_port }}"]
            endpoint = ["http://{{ registry_host }}:{{ registry_port }}"]
      notify: Restart containerd

  handlers:
    - name: Restart containerd
      service:
        name: containerd
        state: restarted
