{{- if .Values.rbac.create -}}
# Role granting the Sysadmin agent the verbs declared in
# agents/sysadmin/src/sysadmin/tools.py. Read-only by default; mutation
# (delete pod) is opt-in via .Values.rbac.destructive — even then it is
# additionally gated by the ApprovalHook at runtime.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "olympus.fullname" . }}-sysadmin
  labels: {{- include "olympus.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "nodes"]
    verbs:     ["get", "list", "watch"]
  {{- if .Values.rbac.destructive }}
  - apiGroups: [""]
    resources: ["pods"]
    verbs:     ["delete"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "olympus.fullname" . }}-sysadmin
  labels: {{- include "olympus.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "olympus.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "olympus.fullname" . }}-sysadmin
{{- end }}
